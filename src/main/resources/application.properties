


# ===============================
# SERVER
# ===============================
server.port=8080
spring.application.name=Hotel-Transylvania

# ===============================
# MYSQL DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/translvaniyadb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# REDIS
# ===============================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,loggers , logfile
management.endpoint.health.show-details=always
management.endpoint.logfile.enabled=true

**Step 2 ? Access it instantly in your browser:**
GET http://localhost:8080/actuator/logfile

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.smartorder=DEBUG
logging.file.name=logs/smart-order.log


# Documenting
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

